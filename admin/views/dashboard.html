<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panou Administrare - Boxing Champions</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --bg-panel: #111111;
            --gold: #d4af37;
            --gold-light: #f0c040;
            --gold-dark: #b8941f;
            --red: #c0392b;
            --red-light: #e74c3c;
            --red-dark: #96281b;
            --text: #e0e0e0;
            --text-muted: #999;
            --glass-bg: rgba(17, 17, 17, 0.75);
            --glass-border: rgba(212, 175, 55, 0.18);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.55);
            --toast-success: #34d399;
            --sidebar-width: 260px;
            --transition: 0.28s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-dark); color: var(--text); min-height: 100vh;
            display: flex; overflow-x: hidden; position: relative; line-height: 1.55;
        }
        #particle-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        /* Auth loading overlay */
        .auth-loading-overlay {
            position: fixed; inset: 0; z-index: 9999;
            background: var(--bg-dark);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 20px;
        }
        .auth-loading-overlay .auth-spinner {
            width: 44px; height: 44px;
            border: 3px solid rgba(212,175,55,0.22);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: authSpin 0.8s linear infinite;
        }
        @keyframes authSpin { to { transform: rotate(360deg); } }
        .auth-loading-overlay .auth-text {
            color: var(--text-muted);
            font-size: 0.95rem; font-weight: 500;
            letter-spacing: 0.03em;
        }
        .auth-loading-overlay .auth-icon {
            font-size: 2.6rem; color: var(--gold); opacity: 0.7;
        }
        .sidebar {
            position: fixed; top: 0; left: 0; width: var(--sidebar-width); height: 100vh;
            background: var(--glass-bg); backdrop-filter: blur(18px) saturate(120%);
            -webkit-backdrop-filter: blur(18px) saturate(120%);
            border-right: 1px solid var(--glass-border); box-shadow: var(--glass-shadow);
            z-index: 10; display: flex; flex-direction: column; transition: transform var(--transition);
        }
        .sidebar-logo { padding: 24px 20px 18px; text-align: center; border-bottom: 1px solid rgba(212,175,55,0.14); flex-shrink: 0; }
        .sidebar-logo img { width: 48px; height: 48px; object-fit: contain; filter: drop-shadow(0 0 10px rgba(212,175,55,0.5)); margin-bottom: 6px; }
        .sidebar-logo h2 { font-size: 1.15rem; font-weight: 700; color: var(--gold); letter-spacing: 0.04em; text-transform: uppercase; }
        .sidebar-nav { flex: 1; overflow-y: auto; padding: 10px 0; display: flex; flex-direction: column; gap: 2px; }
        .sidebar-nav::-webkit-scrollbar { width: 4px; }
        .sidebar-nav::-webkit-scrollbar-thumb { background: rgba(212,175,55,0.25); border-radius: 4px; }
        .sidebar-nav .nav-item {
            display: flex; align-items: center; gap: 12px; padding: 12px 22px;
            cursor: pointer; color: var(--text-muted); font-size: 0.93rem; font-weight: 500;
            border-left: 3px solid transparent; transition: all var(--transition); user-select: none; white-space: nowrap;
        }
        .sidebar-nav .nav-item:hover, .sidebar-nav .nav-item:focus-visible {
            background: rgba(212,175,55,0.07); color: var(--gold-light); border-left-color: var(--gold); outline: none;
        }
        .sidebar-nav .nav-item.active {
            background: rgba(212,175,55,0.12); color: var(--gold); border-left-color: var(--gold); font-weight: 600;
        }
        .sidebar-nav .nav-item i { width: 20px; text-align: center; font-size: 1rem; flex-shrink: 0; }
        .sidebar-footer { padding: 12px 22px; border-top: 1px solid rgba(212,175,55,0.14); flex-shrink: 0; }
        .btn-logout {
            display: flex; align-items: center; gap: 10px; width: 100%; padding: 11px 16px;
            background: rgba(192,57,43,0.12); border: 1px solid rgba(192,57,43,0.35);
            border-radius: 8px; color: var(--red-light); cursor: pointer; font-size: 0.93rem; font-weight: 600; transition: all var(--transition);
        }
        .btn-logout:hover { background: rgba(192,57,43,0.25); border-color: var(--red-light); color: #fff; }
        .main-panel {
            margin-left: var(--sidebar-width); flex: 1; min-height: 100vh;
            padding: 30px 34px; position: relative; z-index: 5; display: flex; flex-direction: column;
        }
        .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; flex-wrap: wrap; gap: 14px; }
        .section-header h1 { font-size: 1.7rem; font-weight: 700; color: var(--gold); letter-spacing: 0.03em; }
        .section-header h1 i { margin-right: 10px; opacity: 0.8; }
        .btn { display: inline-flex; align-items: center; gap: 7px; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 0.93rem; font-weight: 600; transition: all var(--transition); text-decoration: none; }
        .btn-gold { background: linear-gradient(135deg, var(--gold-dark), var(--gold)); color: #0a0a0a; box-shadow: 0 4px 14px rgba(212,175,55,0.3); }
        .btn-gold:hover { box-shadow: 0 6px 20px rgba(212,175,55,0.5); transform: translateY(-1px); }
        .btn-gold:active { transform: translateY(0); }
        .btn-red { background: var(--red); color: #fff; box-shadow: 0 4px 14px rgba(192,57,43,0.3); }
        .btn-red:hover { background: var(--red-light); box-shadow: 0 6px 20px rgba(192,57,43,0.5); transform: translateY(-1px); }
        .btn-red:active { transform: translateY(0); }
        .btn-outline { background: transparent; border: 1px solid var(--gold); color: var(--gold); }
        .btn-outline:hover { background: rgba(212,175,55,0.1); }
        .glass-card { background: var(--glass-bg); backdrop-filter: blur(14px) saturate(110%); -webkit-backdrop-filter: blur(14px) saturate(110%); border: 1px solid var(--glass-border); border-radius: 14px; padding: 22px 24px; box-shadow: var(--glass-shadow); }
        .glass-table-wrap { overflow-x: auto; border-radius: 14px; background: var(--glass-bg); backdrop-filter: blur(14px) saturate(110%); -webkit-backdrop-filter: blur(14px) saturate(110%); border: 1px solid var(--glass-border); box-shadow: var(--glass-shadow); }
        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        table thead th { background: rgba(212,175,55,0.08); color: var(--gold); font-weight: 700; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; padding: 14px 16px; text-align: left; border-bottom: 1px solid var(--glass-border); }
        table tbody td { padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 0.91rem; }
        table tbody tr { transition: background var(--transition); }
        table tbody tr:hover { background: rgba(212,175,55,0.04); }
        table tbody tr:last-child td { border-bottom: none; }
        .actions-cell { display: flex; gap: 8px; }
        .actions-cell button { background: none; border: none; cursor: pointer; padding: 6px 10px; border-radius: 6px; font-size: 0.88rem; transition: all var(--transition); }
        .btn-icon-edit { color: var(--gold-light); }
        .btn-icon-edit:hover { background: rgba(212,175,55,0.15); }
        .btn-icon-delete { color: var(--red-light); }
        .btn-icon-delete:hover { background: rgba(192,57,43,0.15); }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); z-index: 100; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity var(--transition); }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal { background: var(--glass-bg); backdrop-filter: blur(22px) saturate(130%); -webkit-backdrop-filter: blur(22px) saturate(130%); border: 1px solid var(--glass-border); border-radius: 16px; padding: 28px 32px; width: 90%; max-width: 560px; max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.7); position: relative; transform: translateY(14px); transition: transform var(--transition); }
        .modal-overlay.active .modal { transform: translateY(0); }
        .modal h3 { font-size: 1.3rem; color: var(--gold); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .modal .close-modal { position: absolute; top: 14px; right: 18px; background: none; border: none; color: var(--text-muted); font-size: 1.4rem; cursor: pointer; transition: color var(--transition); }
        .modal .close-modal:hover { color: var(--red-light); }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-weight: 600; font-size: 0.85rem; color: var(--gold-light); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.04em; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 14px; border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; background: rgba(255,255,255,0.04); color: var(--text); font-size: 0.93rem; font-family: inherit; transition: border var(--transition); }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 3px rgba(212,175,55,0.1); }
        .form-group textarea { resize: vertical; min-height: 80px; }
        .form-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 22px; }
        .toast-container { position: fixed; top: 22px; right: 22px; z-index: 200; display: flex; flex-direction: column; gap: 10px; }
        .toast { display: flex; align-items: center; gap: 10px; padding: 14px 20px; border-radius: 10px; font-weight: 600; font-size: 0.91rem; min-width: 280px; max-width: 440px; backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); animation: toastSlideIn 0.35s cubic-bezier(0.4,0,0.2,1); box-shadow: 0 8px 28px rgba(0,0,0,0.45); }
        .toast--success { background: rgba(17,17,17,0.92); border: 1px solid var(--toast-success); color: var(--toast-success); }
        .toast--error { background: rgba(17,17,17,0.92); border: 1px solid var(--red-light); color: var(--red-light); }
        .toast--info { background: rgba(17,17,17,0.92); border: 1px solid var(--gold); color: var(--gold-light); }
        @keyframes toastSlideIn { from { opacity: 0; transform: translateX(60px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes toastSlideOut { from { opacity: 1; transform: translateX(0); } to { opacity: 0; transform: translateX(60px); } }
        .empty-state { text-align: center; padding: 50px 20px; color: var(--text-muted); }
        .empty-state i { font-size: 3rem; color: var(--gold); opacity: 0.4; margin-bottom: 14px; display: block; }
        .empty-state p { font-size: 1rem; }
        .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(212,175,55,0.25); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .main-panel { margin-left: 0; padding: 20px 16px; }
            .section-header { flex-direction: column; align-items: flex-start; }
            .section-header h1 { font-size: 1.35rem; }
            .modal { width: 95%; padding: 20px; max-width: none; }
            .mobile-menu-toggle { display: flex !important; }
        }
        .mobile-menu-toggle { display: none; position: fixed; top: 14px; left: 14px; z-index: 20; background: var(--glass-bg); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 8px; color: var(--gold); padding: 10px 14px; cursor: pointer; font-size: 1.3rem; }
        :focus-visible { outline: 2px solid var(--gold-light); outline-offset: 2px; }
        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
    </style>
</head>
<body>
    <!-- Auth loading overlay – afișat până la confirmarea autentificării -->
    <div class="auth-loading-overlay" id="authLoadingOverlay" aria-live="polite" aria-label="Se verifică autentificarea">
        <div class="auth-icon"><i class="fa-solid fa-shield-halved"></i></div>
        <div class="auth-spinner"></div>
        <div class="auth-text">Se verifică autentificarea…</div>
    </div>
    <canvas id="particle-canvas" aria-hidden="true"></canvas>
    <button class="mobile-menu-toggle" id="mobileMenuToggle" aria-label="Deschide meniul" title="Meniu"><i class="fa-solid fa-bars"></i></button>
    <aside class="sidebar" id="sidebar" role="navigation" aria-label="Navigare principală">
        <div class="sidebar-logo">
            <img src="../../public/images/boxing-logo.png" alt="Boxing Champions Logo" onerror="this.style.display='none';this.nextElementSibling.style.display='block';">
            <div style="display:none;font-size:2.5rem;color:var(--gold);"><i class="fa-solid fa-glove"></i></div>
            <h2>Boxing Champions</h2>
        </div>
        <nav class="sidebar-nav" id="sidebarNav">
            <div class="nav-item active" data-section="general" tabindex="0" role="button" aria-current="page"><i class="fa-solid fa-gear"></i> Setări Generale</div>
            <div class="nav-item" data-section="antrenori" tabindex="0" role="button"><i class="fa-solid fa-user-tie"></i> Antrenori</div>
            <div class="nav-item" data-section="evenimente" tabindex="0" role="button"><i class="fa-solid fa-calendar-star"></i> Evenimente</div>
            <div class="nav-item" data-section="program" tabindex="0" role="button"><i class="fa-solid fa-clock"></i> Program</div>
            <div class="nav-item" data-section="abonamente" tabindex="0" role="button"><i class="fa-solid fa-id-card"></i> Abonamente</div>
            <div class="nav-item" data-section="produse" tabindex="0" role="button"><i class="fa-solid fa-box-open"></i> Produse</div>
            <div class="nav-item" data-section="comenzi" tabindex="0" role="button"><i class="fa-solid fa-truck-fast"></i> Comenzi</div>
            <div class="nav-item" data-section="mesaje" tabindex="0" role="button"><i class="fa-solid fa-envelope"></i> Mesaje</div>
            <div class="nav-item" data-section="seo" tabindex="0" role="button"><i class="fa-solid fa-magnifying-glass-chart"></i> SEO</div>
        </nav>
        <div class="sidebar-footer"><button class="btn-logout" id="btnLogout" aria-label="Deconectare"><i class="fa-solid fa-right-from-bracket"></i> Deconectare</button></div>
    </aside>
    <main class="main-panel" id="mainPanel" role="main"></main>
    <div class="modal-overlay" id="modalOverlay" aria-hidden="true">
        <div class="modal" id="modalContent" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
            <button class="close-modal" id="closeModal" aria-label="Închide fereastra">&times;</button>
            <h3 id="modalTitle"><i class="fa-solid fa-pen-to-square"></i> <span id="modalTitleText">Formular</span></h3>
            <form id="modalForm" novalidate></form>
        </div>
    </div>
    <div class="toast-container" id="toastContainer" aria-live="polite" aria-atomic="true"></div>
    <script nonce="%NONCE%">
        (function() {
            'use strict';

            // ──────────────────────────────────────────────
            // Secțiuni – API endpoint-uri aliniate la rutele
            // reale din routes/api.js și câmpuri conforme cu
            // schema bazei de date (db.js).
            // ──────────────────────────────────────────────

            // Setări generale – tratate special: răspunsul GET
            // e un obiect {key: value}, iar PUT acceptă același
            // obiect. În UI transformăm obiectul într-un array
            // pentru afișare tabelară, iar la salvare trimitem
            // întregul obiect îmbogățit cu valoarea editată.
            var SETTINGS_ALLOWED_KEYS = [
                'club_name', 'slogan', 'email', 'phone', 'address',
                'facebook', 'instagram', 'tiktok', 'hero_badge', 'about_text'
            ];

            var SETTINGS_LABELS = {
                club_name: 'Nume Club',
                slogan: 'Slogan',
                email: 'Email Contact',
                phone: 'Telefon',
                address: 'Adresă',
                facebook: 'URL Facebook',
                instagram: 'URL Instagram',
                tiktok: 'URL TikTok',
                hero_badge: 'Text Hero Badge',
                about_text: 'Text Despre Noi'
            };

            var SECTIONS = {
                antrenori: {
                    label: 'Antrenori', icon: 'fa-user-tie', apiBase: '/api/admin/coaches',
                    fields: [
                        { name: 'name', label: 'Nume', type: 'text', required: true },
                        { name: 'specialization', label: 'Specializare', type: 'text', required: false },
                        { name: 'certifications', label: 'Certificări', type: 'textarea', required: false },
                        { name: 'photo', label: 'URL Poză', type: 'url', required: false },
                        { name: 'quote', label: 'Citat', type: 'textarea', required: false },
                        { name: 'active', label: 'Activ', type: 'select', required: false, options: ['da','nu'] }
                    ],
                    columns: ['Nume', 'Specializare', 'Certificări', 'Activ'],
                    rowRenderer: function(item) {
                        return '<tr><td><strong>'+escapeHtml(item.name||'—')+'</strong></td><td>'+escapeHtml(item.specialization||'—')+'</td><td>'+escapeHtml((item.certifications||'').substring(0,50))+((item.certifications||'').length>50?'…':'')+'</td><td>'+escapeHtml(item.active?'da':'nu')+'</td><td><div class="actions-cell"><button class="btn-icon-edit" data-action="edit" data-id="'+escapeHtml(item.id)+'" aria-label="Editează antrenor"><i class="fa-solid fa-pen"></i></button><button class="btn-icon-delete" data-action="delete" data-id="'+escapeHtml(item.id)+'" aria-label="Șterge antrenor"><i class="fa-solid fa-trash"></i></button></div></td></tr>';
                    },
                    preSubmit: function(payload) {
                        if (payload.active !== undefined) { payload.active = payload.active === 'da' ? true : false; }
                        return payload;
                    }
                },
                evenimente: {
                    label: 'Evenimente', icon: 'fa-calendar-star', apiBase: '/api/admin/events',
                    fields: [
                        { name: 'title', label: 'Titlu', type: 'text', required: true },
                        { name: 'event_date', label: 'Data', type: 'date', required: true },
                        { name: 'location', label: 'Locație', type: 'text', required: false },
                        { name: 'description', label: 'Descriere', type: 'textarea', required: false },
                        { name: 'active', label: 'Activ', type: 'select', required: false, options: ['da','nu'] }
                    ],
                    columns: ['Titlu', 'Data', 'Locație', 'Activ'],
                    rowRenderer: function(item) {
                        return '<tr><td><strong>'+escapeHtml(item.title||'—')+'</strong></td><td>'+escapeHtml(item.event_date||'—')+'</td><td>'+escapeHtml(item.location||'—')+'</td><td>'+escapeHtml(item.active?'da':'nu')+'</td><td><div class="actions-cell"><button class="btn-icon-edit" data-action="edit" data-id="'+escapeHtml(item.id)+'" aria-label="Editează eveniment"><i class="fa-solid fa-pen"></i></button><button class="btn-icon-delete" data-action="delete" data-id="'+escapeHtml(item.id)+'" aria-label="Șterge eveniment"><i class="fa-solid fa-trash"></i></button></div></td></tr>';
                    },
                    preSubmit: function(payload) {
                        if (payload.active !== undefined) { payload.active = payload.active === 'da' ? true : false; }
                        return payload;
                    }
                },
                program: {
                    label: 'Program', icon: 'fa-clock', apiBase: '/api/admin/schedule',
                    fields: [
                        { name: 'day', label: 'Zi', type: 'select', required: true, options: ['Luni','Marți','Miercuri','Joi','Vineri','Sâmbătă','Duminică'] },
                        { name: 'start_time', label: 'Ora Început (HH:mm)', type: 'text', required: true, placeholder: '09:00' },
                        { name: 'end_time', label: 'Ora Sfârșit (HH:mm)', type: 'text', required: true, placeholder: '10:30' },
                        { name: 'category', label: 'Categorie', type: 'text', required: true },
                        { name: 'gender', label: 'Sex', type: 'select', required: true, options: ['Masculin','Feminin','Mixt'] },
                        { name: 'active', label: 'Activ', type: 'select', required: false, options: ['da','nu'] }
                    ],
                    columns: ['Zi', 'Interval Orar', 'Categorie', 'Sex', 'Activ'],
                    rowRenderer: function(item) {
                        return '<tr><td>'+escapeHtml(item.day||'—')+'</td><td>'+escapeHtml(item.start_time||'')+' - '+escapeHtml(item.end_time||'')+'</td><td>'+escapeHtml(item.category||'—')+'</td><td>'+escapeHtml(item.gender||'—')+'</td><td>'+escapeHtml(item.active?'da':'nu')+'</td><td><div class="actions-cell"><button class="btn-icon-edit" data-action="edit" data-id="'+escapeHtml(item.id)+'" aria-label="Editează program"><i class="fa-solid fa-pen"></i></button><button class="btn-icon-delete" data-action="delete" data-id="'+escapeHtml(item.id)+'" aria-label="Șterge program"><i class="fa-solid fa-trash"></i></button></div></td></tr>';
                    },
                    preSubmit: function(payload) {
                        if (payload.active !== undefined) { payload.active = payload.active === 'da' ? true : false; }
                        return payload;
                    }
                },
                abonamente: {
                    label: 'Abonamente', icon: 'fa-id-card', apiBase: '/api/admin/subscriptions',
                    fields: [
                        { name: 'name', label: 'Nume Abonament', type: 'text', required: true },
                        { name: 'monthly_price', label: 'Preț Lunar (RON)', type: 'number', required: true, step: '0.01' },
                        { name: 'yearly_price', label: 'Preț Anual (RON)', type: 'number', required: true, step: '0.01' },
                        { name: 'benefits', label: 'Beneficii (JSON array)', type: 'textarea', required: false, placeholder: '["beneficiu 1","beneficiu 2"]' },
                        { name: 'highlighted', label: 'Evidențiat', type: 'select', required: false, options: ['da','nu'] },
                        { name: 'active', label: 'Activ', type: 'select', required: false, options: ['da','nu'] }
                    ],
                    columns: ['Nume', 'Preț Lunar', 'Preț Anual', 'Evidențiat', 'Activ'],
                    rowRenderer: function(item) {
                        return '<tr><td><strong>'+escapeHtml(item.name||'—')+'</strong></td><td>'+escapeHtml(String(item.monthly_price||'—'))+' RON</td><td>'+escapeHtml(String(item.yearly_price||'—'))+' RON</td><td>'+escapeHtml(item.highlighted?'da':'nu')+'</td><td>'+escapeHtml(item.active?'da':'nu')+'</td><td><div class="actions-cell"><button class="btn-icon-edit" data-action="edit" data-id="'+escapeHtml(item.id)+'" aria-label="Editează abonament"><i class="fa-solid fa-pen"></i></button><button class="btn-icon-delete" data-action="delete" data-id="'+escapeHtml(item.id)+'" aria-label="Șterge abonament"><i class="fa-solid fa-trash"></i></button></div></td></tr>';
                    },
                    preSubmit: function(payload) {
                        if (payload.highlighted !== undefined) { payload.highlighted = payload.highlighted === 'da' ? true : false; }
                        if (payload.active !== undefined) { payload.active = payload.active === 'da' ? true : false; }

                    if (!resp.ok) { var ed = await resp.json().catch(function() { return {}; }); throw new Error(ed.message || ed.error || 'Eroare server (' + resp.status + ')'); }
                    return await resp.json();
                } catch (err) {

            function initParticles() {
                var ctx = particleCanvas.getContext('2d');
                var particles = [];
                var COUNT = 65;
                var PALETTE = ['rgba(212,175,55,0.22)','rgba(240,192,64,0.18)','rgba(184,148,31,0.24)','rgba(230,180,50,0.16)','rgba(200,160,40,0.20)'];
                function resize() { particleCanvas.width = window.innerWidth; particleCanvas.height = window.innerHeight; }
                window.addEventListener('resize', resize); resize();
                function mk() { return { x: Math.random()*particleCanvas.width, y: Math.random()*particleCanvas.height, radius: Math.random()*2.8+0.8, speedX: (Math.random()-0.5)*0.35, speedY: (Math.random()-0.5)*0.35, color: PALETTE[Math.floor(Math.random()*PALETTE.length)], opacity: Math.random()*0.6+0.2, pulse: Math.random()*Math.PI*2, pulseSpeed: Math.random()*0.015+0.005 }; }
                for (var i = 0; i < COUNT; i++) particles.push(mk());
                function animate() {
                    ctx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
                    for (var i = 0; i < particles.length; i++) {
                        var p = particles[i];
                        p.x += p.speedX; p.y += p.speedY; p.pulse += p.pulseSpeed;
                        var o = p.opacity + Math.sin(p.pulse) * 0.12;
                        if (p.x < -10) p.x = particleCanvas.width + 10;
                        if (p.x > particleCanvas.width + 10) p.x = -10;
                        if (p.y < -10) p.y = particleCanvas.height + 10;
                        if (p.y > particleCanvas.height + 10) p.y = -10;
                        ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2);
                        ctx.fillStyle = p.color.replace(/[\d.]+\)$/, Math.max(0.04, Math.min(0.5, o)) + ')');
                        ctx.fill();
                    }
                    for (var i = 0; i < particles.length; i++) {
                        for (var j = i + 1; j < particles.length; j++) {
                            var dx = particles[i].x - particles[j].x, dy = particles[i].y - particles[j].y;
                            var dist = Math.sqrt(dx*dx + dy*dy);
                            if (dist < 100) { ctx.beginPath(); ctx.moveTo(particles[i].x, particles[i].y); ctx.lineTo(particles[j].x, particles[j].y); ctx.strokeStyle = 'rgba(212,175,55,' + (0.06*(1 - dist/100)) + ')'; ctx.lineWidth = 0.5; ctx.stroke(); }
                        }
                    }
                    requestAnimationFrame(animate);
                }
                animate();
            }

            async function checkAuth() {
                var controller, timeoutId;
                try {
                    controller = typeof AbortController !== 'undefined' ? new AbortController() : null;
                    if (controller) { timeoutId = setTimeout(function() { controller.abort(); }, 8000); }
                    var fetchOpts = { method: 'GET', credentials: 'include', headers: { 'Accept': 'application/json' } };
                    if (controller) { fetchOpts.signal = controller.signal; }
                    var r = await fetch('/api/auth/check', fetchOpts);
                    if (timeoutId) clearTimeout(timeoutId);
                    if (r.status === 401 || r.status === 403) { return failAuthAndRedirect(); }
                    var d;
                    try { d = await r.json(); } catch (parseErr) { return failAuthAndRedirect(); }
                    if (!d || d.authenticated === false || d.authenticated !== true) { return failAuthAndRedirect(); }
                    return true;
                } catch (e) {
                    if (timeoutId) clearTimeout(timeoutId);
                    return failAuthAndRedirect(e.name === 'AbortError' ? 'Timpul de verificare a expirat. Redirecționare…' : null);
                }
            }

            /**

            function openModal(sk, item) {
                var sec = SECTIONS[sk]; editingId = item ? item.id : null;
                modalTitleText.textContent = item ? 'Editare ' + sec.label : 'Adaugă ' + sec.label;
                var fh = '';
                sec.fields.forEach(function(f) {
                    var raw = item ? (item[f.name] !== undefined ? item[f.name] : '') : '';
                    var v = raw;
                    // Conversie boolean 0/1 → 'da'/'nu' pentru select-ul de active
                    if (f.name === 'active' || f.name === 'highlighted') {
                        if (raw === 1 || raw === true) v = 'da';
                        else if (raw === 0 || raw === false) v = 'nu';
                        else v = String(raw);
                    } else if (f.name === 'is_read') {
                        v = raw === 1 ? 'da' : 'nu';

                        v = String(raw);
                    }
                    fh += '<div class="form-group"><label for="field_'+f.name+'">'+escapeHtml(f.label)+(f.required?' <span style="color:var(--red-light);">*</span>':'')+'</label>';
                    if (f.type === 'textarea') {
                        fh += '<textarea id="field_'+f.name+'" name="'+f.name+'" '+(f.required?'required':'')+(f.placeholder?' placeholder="'+escapeHtml(f.placeholder)+'"':'')+'>'+escapeHtml(v)+'</textarea>';
                    } else if (f.type === 'select' && f.options) {
                        fh += '<select id="field_'+f.name+'" name="'+f.name+'" '+(f.required?'required':'')+'>';
                        f.options.forEach(function(o) { fh += '<option value="'+escapeHtml(o)+'"'+(String(v)===String(o)?' selected':'')+'>'+escapeHtml(o)+'</option>'; });
                        fh += '</select>';
                    } else {
                        var it = f.type || 'text', st = f.step ? ' step="'+f.step+'"' : '';
                        fh += '<input type="'+it+'" id="field_'+f.name+'" name="'+f.name+'" value="'+escapeHtml(v)+'" '+(f.required?'required':'')+(f.placeholder?' placeholder="'+escapeHtml(f.placeholder)+'"':'')+st+'>';
                    }
                    fh += '</div>';
                });
                fh += '<div class="form-actions"><button type="button" class="btn btn-outline" id="btnCancelModal">Anulează</button><button type="submit" class="btn btn-gold"><i class="fa-solid fa-floppy-disk"></i> Salvează</button></div>';
                modalForm.innerHTML = fh; modalOverlay.classList.add('active'); modalOverlay.setAttribute('aria-hidden', 'false');
                setTimeout(function() { var fi = modalForm.querySelector('input, select, textarea'); if (fi) fi.focus(); }, 150);
                document.getElementById('btnCancelModal').addEventListener('click', closeModal);
                modalForm.onsubmit = async function(e) { e.preventDefault(); await submitForm(sk); };
            }

            function closeModal() { modalOverlay.classList.remove('active'); modalOverlay.setAttribute('aria-hidden', 'true'); modalForm.innerHTML = ''; editingId = null; }

            async function submitForm(sk) {
                var sec = SECTIONS[sk], fd = new FormData(modalForm), payload = {};
                sec.fields.forEach(function(f) {
                    var v = fd.get(f.name);
                    if (v === null || v === '') { payload[f.name] = (f.type === 'number') ? null : ''; return; }
                    if (f.type === 'number') { payload[f.name] = parseFloat(v); if (isNaN(payload[f.name])) payload[f.name] = null; }
                    else { payload[f.name] = v; }
                });
                // Aplică preSubmit (conversii boolean etc.)
                if (sec.preSubmit) { payload = sec.preSubmit(payload); }

                try {
                    var url, method;

                    // Comenzi: doar PATCH status (nu există PUT /api/admin/orders/:id)
                    if (sec.useStatusPatch && editingId) {
                        url = sec.apiBase + '/' + editingId + '/status';
                        method = 'PATCH';
                        var statusPayload = { status: payload.status };
                        await apiRequest(url, { method: method, body: JSON.stringify(statusPayload) });
                        showToast('Status comandă actualizat!', 'success');
                        closeModal(); loadSection(sk);
                        return;
                    }

                    // Mesaje: PATCH /api/admin/messages/:id/read pentru marcare citit
                    if (sec.useReadPatch && editingId && payload.is_read === 1) {
                        url = sec.apiBase + '/' + editingId + '/read';
                        method = 'PATCH';
                        await apiRequest(url, { method: method, body: JSON.stringify({}) });
                        showToast('Mesaj marcat ca citit!', 'success');
                        closeModal(); loadSection(sk);
                        return;
                    }

                    // SEO batch: PUT /api/admin/seo cu array
                    if (sec.seoBatchMode) {
                        url = sec.apiBase;
                        method = 'PUT';
                        var seoArray = [payload];
                        await apiRequest(url, { method: method, body: JSON.stringify(seoArray) });
                        showToast('Setări SEO actualizate!', 'success');
                        closeModal(); loadSection(sk);
                        return;
                    }

                    // Caz standard: POST pentru create, PUT pentru update
                    url = editingId ? sec.apiBase + '/' + editingId : sec.apiBase;
                    method = editingId ? 'PUT' : 'POST';
                    await apiRequest(url, { method: method, body: JSON.stringify(payload) });
                    showToast(editingId ? 'Înregistrare actualizată cu succes!' : 'Înregistrare adăugată cu succes!', 'success');
                    closeModal(); loadSection(sk);
                } catch (err) {}
            }

            async function confirmDelete(sk, id) {
                var sec = SECTIONS[sk];
                if (!confirm('Ești sigur că vrei să ștergi această înregistrare din ' + sec.label.toLowerCase() + '? Această acțiune este ireversibilă.')) return;
                try { await apiRequest(sec.apiBase + '/' + id, { method: 'DELETE' }); showToast('Înregistrare ștearsă cu succes!', 'success'); loadSection(sk); } catch (err) {}
            }

            sidebarNav.addEventListener('click', function(e) { var ni = e.target.closest('.nav-item'); if (!ni) return; var sk = ni.getAttribute('data-section'); if (sk) switchSection(sk); });
            sidebarNav.addEventListener('keydown', function(e) { if (e.key === 'Enter' || e.key === ' ') { var ni = e.target.closest('.nav-item'); if (!ni) return; e.preventDefault(); var sk = ni.getAttribute('data-section'); if (sk) switchSection(sk); } });

            function switchSection(sk) {
                currentSection = sk;
                sidebarNav.querySelectorAll('.nav-item').forEach(function(it) { it.classList.remove('active'); it.removeAttribute('aria-current'); });
                var ai = sidebarNav.querySelector('[data-section="'+sk+'"]'); if (ai) { ai.classList.add('active'); ai.setAttribute('aria-current', 'page'); }
                if (sk === 'general') {
                    loadSettingsSection();
                } else {
                    loadSection(sk);
                }
                if (window.innerWidth <= 768) sidebar.classList.remove('open');
            }

            closeModalBtn.addEventListener('click', closeModal);
            modalOverlay.addEventListener('click', function(e) { if (e.target === modalOverlay) closeModal(); });
            document.addEventListener('keydown', function(e) { if (e.key === 'Escape' && modalOverlay.classList.contains('active')) closeModal(); });

            btnLogout.addEventListener('click', async function() {
                if (!confirm('Ești sigur că vrei să te deconectezi?')) return;
                try { await apiRequest('/api/auth/logout', { method: 'POST' }); } catch (err) {}
                window.location.replace('/admin');
            });

            mobileMenuToggle.addEventListener('click', function() { sidebar.classList.toggle('open'); });
            document.addEventListener('click', function(e) {
                if (window.innerWidth <= 768 && !sidebar.contains(e.target) && e.target !== mobileMenuToggle && !mobileMenuToggle.contains(e.target)) sidebar.classList.remove('open');
            });

            async function init() {
                var auth = await checkAuth();
                if (!auth) return;
                removeAuthLoadingAndBootstrap();
                // Secțiunea implicită e `general`
                loadSettingsSection();
                showToast('Bine ai venit în panoul de administrare!', 'info');
            }
            init();
        })();
    </script>
</body>
</html>
