<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panou Admin — Boxing Champions</title>
  <link rel="stylesheet" href="/admin/css/admin.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <div class="admin-layout">

    <!-- OVERLAY PENTRU MOBILE SIDEBAR -->
    <div class="sidebar-overlay" id="sidebarOverlay" aria-hidden="true"></div>

    <!-- SIDEBAR -->
    <aside class="admin-sidebar" id="adminSidebar" aria-label="Navigare principală">
      <!-- Brand -->
      <div class="sidebar-brand">
        <div class="brand-icon">BC</div>
        <div>
          <div class="brand-text">Boxing Champions</div>
          <div class="brand-sub">Panou Admin</div>
        </div>
      </div>

      <!-- Navigare -->
      <nav class="sidebar-nav" aria-label="Secțiuni administrare">
        <!-- Principal -->
        <div class="sidebar-section">
          <div class="sidebar-section-title">Principal</div>
          <button class="sidebar-link sidebar-nav-item active" data-section="settings" aria-current="page">
            <span class="link-icon"><i class="fa-solid fa-gear"></i></span>
            <span class="link-label">Setări Generale</span>
          </button>
        </div>

        <!-- Conținut -->
        <div class="sidebar-section">
          <div class="sidebar-section-title">Conținut</div>
          <button class="sidebar-link sidebar-nav-item" data-section="coaches">
            <span class="link-icon"><i class="fa-solid fa-user-graduate"></i></span>
            <span class="link-label">Antrenori</span>
          </button>
          <button class="sidebar-link sidebar-nav-item" data-section="events">
            <span class="link-icon"><i class="fa-solid fa-calendar-star"></i></span>
            <span class="link-label">Evenimente</span>
          </button>
          <button class="sidebar-link sidebar-nav-item" data-section="achievements">
            <span class="link-icon"><i class="fa-solid fa-trophy"></i></span>
            <span class="link-label">Realizări</span>
          </button>
          <button class="sidebar-link sidebar-nav-item" data-section="schedule">
            <span class="link-icon"><i class="fa-solid fa-clock"></i></span>
            <span class="link-label">Program</span>
          </button>
        </div>

        <!-- Comercial -->
        <div class="sidebar-section">
          <div class="sidebar-section-title">Comercial</div>
          <button class="sidebar-link sidebar-nav-item" data-section="subscriptions">
            <span class="link-icon"><i class="fa-solid fa-ticket"></i></span>
            <span class="link-label">Abonamente</span>
          </button>
          <button class="sidebar-link sidebar-nav-item" data-section="products">
            <span class="link-icon"><i class="fa-solid fa-store"></i></span>
            <span class="link-label">Produse</span>
          </button>
          <button class="sidebar-link sidebar-nav-item" data-section="orders">
            <span class="link-icon"><i class="fa-solid fa-receipt"></i></span>
            <span class="link-label">Comenzi</span>
            <span class="link-badge" id="badge-orders" style="display:none;">0</span>
          </button>
        </div>

        <!-- Comunicare -->
        <div class="sidebar-section">
          <div class="sidebar-section-title">Comunicare</div>
          <button class="sidebar-link sidebar-nav-item" data-section="messages">
            <span class="link-icon"><i class="fa-solid fa-envelope"></i></span>
            <span class="link-label">Mesaje</span>
            <span class="link-badge" id="badge-messages" style="display:none;">0</span>
          </button>
        </div>

        <!-- Marketing -->
        <div class="sidebar-section">
          <div class="sidebar-section-title">Marketing</div>
          <button class="sidebar-link sidebar-nav-item" data-section="seo">
            <span class="link-icon"><i class="fa-solid fa-magnifying-glass-chart"></i></span>
            <span class="link-label">SEO</span>
          </button>
        </div>
      </nav>

      <!-- Footer sidebar -->
      <div class="sidebar-footer">
        <div class="sidebar-user" id="sidebarUser" title="Utilizator autentificat">
          <div class="user-avatar">A</div>
          <div class="user-info">
            <div class="user-name">Admin</div>
            <div class="user-role">Administrator</div>
          </div>
        </div>
        <button class="sidebar-link" id="btnLogout" style="margin-top:8px;color:var(--red-400);" type="button">
          <span class="link-icon"><i class="fa-solid fa-right-from-bracket"></i></span>
          <span class="link-label">Deconectare</span>
        </button>
      </div>
    </aside>

    <!-- CONȚINUT PRINCIPAL -->
    <main class="admin-main" id="adminMain">
      <!-- Top Bar -->
      <header class="admin-topbar">
        <div class="topbar-left">
          <button class="hamburger" id="hamburgerMenu" aria-label="Deschide/închide meniul" type="button">
            <i class="fa-solid fa-bars"></i>
          </button>
          <h1 class="page-title" id="pageTitle">Setări Generale</h1>
        </div>
        <div class="topbar-right">
          <div class="topbar-search">
            <span class="search-icon"><i class="fa-solid fa-magnifying-glass"></i></span>
            <input type="search" id="globalSearch" placeholder="Caută..." aria-label="Căutare globală">
          </div>
          <button class="btn btn-ghost btn-icon" id="btnRefresh" title="Reîmprospătează" type="button" aria-label="Reîmprospătează secțiunea">
            <i class="fa-solid fa-rotate-right"></i>
          </button>
        </div>
      </header>

      <!-- Conținut dinamic -->
      <div class="admin-content main-content" id="mainContent" aria-live="polite">
        <!-- Încărcare inițială -->
        <div class="skeleton-wrapper">
          <div class="skeleton skeleton--title"></div>
          <div class="skeleton skeleton--text"></div>
          <div class="skeleton skeleton--text skeleton--short"></div>
          <div class="skeleton skeleton--card"></div>
        </div>
      </div>
    </main>

  </div>

  <script src="/admin/js/admin.js"></script>
</body>
</html>
