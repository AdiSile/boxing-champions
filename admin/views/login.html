<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Boxing Champions — Autentificare Panou de Administrare">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="/images/badge.png">
  <link rel="apple-touch-icon" href="/images/badge.png">

  <title>Autentificare | Boxing Champions Admin</title>

  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;500;600;700;800;900&family=Oswald:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Global styles (glassmorphism, buttons, typography) -->
  <link rel="stylesheet" href="/css/style.css">

  <style>
    /* ============================================================
       LOGIN PAGE — Immersive Overrides & Specifics
       ============================================================ */

    :root {
      --gold-primary: #d4a843;
      --gold-bright: #f0c75e;
      --gold-metallic: linear-gradient(135deg, #bf953f, #fcf6b5, #b38728, #fbf5b7);
      --red-blood: #c62828;
      --red-vivid: #e53935;
      --black-deep: #0a0a0a;
      --glass-bg: rgba(18, 18, 18, 0.6);
      --glass-border: rgba(212, 168, 67, 0.25);
      --glass-blur: 20px;
      --font-display: 'Bebas Neue', 'Oswald', sans-serif;
      --font-heading: 'Oswald', 'Bebas Neue', sans-serif;
      --font-body: 'Montserrat', 'Helvetica Neue', Arial, sans-serif;
      --ease-out-expo: cubic-bezier(0.19, 1, 0.22, 1);
      --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-body);
      background: var(--black-deep);
      color: #f5f0eb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      cursor: none;
    }

    /* ---- Skip to Content (WCAG 2.2 — 2.4.1 Bypass Blocks) ---- */
    .skip-to-content {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%) translateY(-120%);
      z-index: 10000;
      background: var(--gold-primary);
      color: #0a0a0a;
      font-family: var(--font-heading);
      font-size: 0.9rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 0.75em 1.8em;
      border-radius: 0 0 12px 12px;
      text-decoration: none;
      box-shadow: 0 6px 24px rgba(0,0,0,0.6);
      transition: transform 0.25s var(--ease-out-expo);
      outline: none;
    }

    .skip-to-content:focus {
      transform: translateX(-50%) translateY(0);
    }

    .skip-to-content:focus-visible {
      outline: 3px solid #fff;
      outline-offset: 2px;
    }

    /* ---- Login Background ---- */
    .login-bg {
      position: fixed;
      inset: 0;
      z-index: -2;
    }

    .login-bg img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.25) saturate(0.6);
    }

    .login-bg__overlay {
      position: fixed;
      inset: 0;
      z-index: -1;
      background:
        radial-gradient(ellipse at 50% 40%, rgba(212,168,67,0.12) 0%, transparent 60%),
        radial-gradient(ellipse at 30% 70%, rgba(198,40,40,0.08) 0%, transparent 55%),
        linear-gradient(to bottom, rgba(10,10,10,0.3) 0%, rgba(10,10,10,0.85) 100%);
    }

    /* ---- Particles Canvas ---- */
    #particles-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0.3;
    }

    /* ---- Main Container ---- */
    .login-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 460px;
      padding: 1.5rem;
    }

    /* ---- Login Card (Glassmorphism) ---- */
    .login-card {
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: clamp(2rem, 5vw, 3rem);
      box-shadow: 0 16px 48px rgba(0,0,0,0.55), 0 0 0 1px rgba(212,168,67,0.08) inset;
      animation: cardIn 0.7s var(--ease-out-expo) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(32px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ---- Logo & Brand ---- */
    .login-brand {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-brand__badge {
      display: inline-block;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 3px solid var(--gold-primary);
      padding: 4px;
      background: rgba(10,10,10,0.7);
      box-shadow: 0 0 32px rgba(212,168,67,0.2);
      margin-bottom: 1.2rem;
      animation: badgePulse 3s ease-in-out infinite;
    }

    @keyframes badgePulse {
      0%, 100% { box-shadow: 0 0 24px rgba(212,168,67,0.15); }
      50%      { box-shadow: 0 0 40px rgba(212,168,67,0.35); }
    }

    .login-brand__badge img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: contain;
    }

    .login-brand__title {
      font-family: var(--font-display);
      font-size: clamp(1.8rem, 4vw, 2.4rem);
      letter-spacing: 0.06em;
      color: #f5f0eb;
      line-height: 1;
    }

    .login-brand__title span {
      background: var(--gold-metallic);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
    }

    .login-brand__subtitle {
      font-family: var(--font-body);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: #b0b0b0;
      margin-top: 0.5rem;
    }

    /* ---- Form ---- */
    .login-form {
      display: flex;
      flex-direction: column;
      gap: 1.3rem;
    }

    .login-form__group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .login-form__label {
      font-family: var(--font-heading);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--gold-primary);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .login-form__label i {
      font-size: 0.85rem;
      color: var(--gold-primary);
      width: 16px;
      text-align: center;
    }

    .login-form__input-wrap {
      position: relative;
    }

    .login-form__input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 0.9em 1.1em 0.9em 2.8em;
      color: #f5f0eb;
      font-family: var(--font-body);
      font-size: 0.95rem;
      transition: all 0.3s var(--ease-smooth);
      outline: none;
    }

    .login-form__input:focus {
      border-color: var(--gold-primary);
      box-shadow: 0 0 0 4px rgba(212,168,67,0.08);
      background: rgba(255,255,255,0.06);
    }

    /* ---- WCAG 2.2 focus-visible for keyboard users ---- */
    .login-form__input:focus-visible {
      outline: 2px solid var(--gold-bright);
      outline-offset: 2px;
      border-color: var(--gold-primary);
      box-shadow: 0 0 0 4px rgba(212,168,67,0.15);
      background: rgba(255,255,255,0.08);
    }

    .login-form__input::placeholder {
      color: rgba(255,255,255,0.22);
    }

    .login-form__input--error {
      border-color: var(--red-vivid) !important;
      box-shadow: 0 0 0 4px rgba(198,40,40,0.1) !important;
    }

    .login-form__input--error:focus-visible {
      outline-color: var(--red-vivid);
    }

    .login-form__icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,0.25);
      font-size: 0.95rem;
      pointer-events: none;
      transition: color 0.3s;
    }

    .login-form__input:focus ~ .login-form__icon {
      color: var(--gold-primary);
    }

    /* Password toggle */
    .login-form__toggle-pw {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(255,255,255,0.3);
      cursor: pointer;
      font-size: 0.9rem;
      padding: 0.3rem;
      transition: color 0.3s;
      z-index: 2;
    }

    .login-form__toggle-pw:hover {
      color: var(--gold-primary);
    }

    .login-form__toggle-pw:focus-visible {
      outline: 2px solid var(--gold-bright);
      outline-offset: 2px;
      color: var(--gold-primary);
      border-radius: 4px;
    }

    /* ---- Error message ---- */
    .login-error {
      background: rgba(198,40,40,0.12);
      border: 1px solid rgba(198,40,40,0.3);
      border-radius: 12px;
      padding: 0.8em 1em;
      color: #f5a5a5;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      animation: shakeError 0.5s ease;
      display: none;
    }

    .login-error--visible {
      display: flex;
    }

    .login-error i {
      font-size: 1rem;
      color: var(--red-vivid);
      flex-shrink: 0;
    }

    @keyframes shakeError {
      0%, 100% { transform: translateX(0); }
      15%  { transform: translateX(-6px); }
      30%  { transform: translateX(6px); }
      45%  { transform: translateX(-4px); }
      60%  { transform: translateX(4px); }
      75%  { transform: translateX(-2px); }
      90%  { transform: translateX(2px); }
    }

    /* ---- Submit Button ---- */
    .login-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.6em;
      width: 100%;
      font-family: var(--font-heading);
      font-size: 1rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      padding: 0.95em 2em;
      border: none;
      border-radius: 50px;
      background: var(--gold-metallic);
      color: #0a0a0a;
      cursor: pointer;
      transition: all 0.35s var(--ease-smooth);
      box-shadow: 0 4px 20px rgba(212,168,67,0.25);
      position: relative;
      overflow: hidden;
      margin-top: 0.5rem;
    }

    .login-btn:hover {
      box-shadow: 0 8px 32px rgba(212,168,67,0.4);
      transform: translateY(-2px);
    }

    .login-btn:active {
      transform: translateY(0);
      box-shadow: 0 2px 12px rgba(212,168,67,0.3);
    }

    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }

    .login-btn:focus-visible {
      outline: 3px solid #fff;
      outline-offset: 3px;
      box-shadow: 0 0 0 6px rgba(212,168,67,0.3);
    }

    .login-btn__spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid transparent;
      border-top-color: #0a0a0a;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    .login-btn--loading .login-btn__spinner {
      display: inline-block;
    }

    .login-btn--loading .login-btn__text {
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ---- Footer links ---- */
    .login-footer {
      text-align: center;
      margin-top: 1.6rem;
    }

    .login-footer__link {
      font-size: 0.8rem;
      color: #b0b0b0;
      text-decoration: none;
      transition: color 0.3s;
    }

    .login-footer__link:hover {
      color: var(--gold-primary);
    }

    .login-footer__link:focus-visible {
      outline: 2px solid var(--gold-bright);
      outline-offset: 2px;
      border-radius: 2px;
    }

    .login-footer__link i {
      margin-right: 0.35em;
    }

    /* ---- Toast (positioned in login context) ---- */
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      z-index: 5000;
      padding: 0.9em 1.8em;
      border-radius: 14px;
      font-size: 0.9rem;
      font-weight: 600;
      box-shadow: 0 10px 36px rgba(0,0,0,0.55);
      animation: toastSlideIn 0.4s var(--ease-out-expo);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      display: flex;
      align-items: center;
      gap: 0.6em;
    }

    .toast--success {
      background: rgba(46,125,50,0.92);
      color: #fff;
      border: 1px solid rgba(76,175,80,0.4);
    }

    .toast--error {
      background: rgba(198,40,40,0.92);
      color: #fff;
      border: 1px solid rgba(229,57,53,0.4);
    }

    .toast--info {
      background: rgba(212,168,67,0.92);
      color: #0a0a0a;
      border: 1px solid rgba(240,199,94,0.4);
    }

    @keyframes toastSlideIn {
      from { opacity: 0; transform: translateX(60px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* ---- Responsive ---- */
    @media (max-width: 520px) {
      .login-container {
        padding: 1rem;
      }

      .login-card {
        padding: 1.8rem 1.4rem;
        border-radius: 20px;
      }

      .login-brand__badge {
        width: 64px;
        height: 64px;
      }

      .login-brand__title {
        font-size: 1.5rem;
      }

      .toast {
        left: 1rem;
        right: 1rem;
        bottom: 1rem;
        font-size: 0.82rem;
      }
    }

    @media (max-width: 420px) {
      .login-card {
        padding: 1.4rem 1rem;
        border-radius: 18px;
      }

      .login-form__input {
        padding: 0.9em 0.85em 0.9em 2.5em;
        font-size: 0.9rem;
        border-radius: 12px;
      }

      .login-form__icon {
        left: 0.85rem;
        font-size: 0.9rem;
      }

      .login-form__toggle-pw {
        right: 0.75rem;
        font-size: 0.9rem;
      }

      .login-btn {
        font-size: 0.95rem;
        padding: 0.9em 1.8em;
      }

      .login-form {
        gap: 1.1rem;
      }

      .login-brand {
        margin-bottom: 1.5rem;
      }

      .login-brand__badge {
        width: 60px;
        height: 60px;
        margin-bottom: 0.8rem;
      }

      .login-brand__title {
        font-size: 1.5rem;
      }

      .login-brand__subtitle {
        font-size: 0.7rem;
        margin-top: 0.3rem;
      }

      .login-footer {
        margin-top: 1.2rem;
      }
    }

    /* ---- 320px small phones ---- */
    @media (max-width: 360px) {
      .login-container {
        padding: 0.4rem;
      }

      .login-card {
        padding: 1.1rem 0.7rem;
        border-radius: 16px;
      }

      .login-brand {
        margin-bottom: 1.1rem;
      }

      .login-brand__badge {
        width: 50px;
        height: 50px;
        border-width: 2px;
        padding: 3px;
        margin-bottom: 0.6rem;
      }

      .login-brand__title {
        font-size: 1.25rem;
        letter-spacing: 0.04em;
      }

      .login-brand__subtitle {
        font-size: 0.65rem;
        letter-spacing: 0.12em;
        margin-top: 0.15rem;
      }

      .login-form {
        gap: 0.85rem;
      }

      .login-form__group {
        gap: 0.25rem;
      }

      .login-form__label {
        font-size: 0.68rem;
        letter-spacing: 0.08em;
      }

      .login-form__label i {
        font-size: 0.75rem;
        width: 14px;
      }

      .login-form__input {
        padding: 0.8em 0.7em 0.8em 2.2em;
        font-size: 0.85rem;
        border-radius: 10px;
        line-height: 1.35;
        min-height: 44px;
      }

      .login-form__icon {
        left: 0.7rem;
        font-size: 0.8rem;
      }

      .login-form__toggle-pw {
        right: 0.55rem;
        font-size: 0.82rem;
        padding: 0.35rem;
      }

      .login-btn {
        font-size: 0.85rem;
        padding: 0.85em 1.4em;
        border-radius: 40px;
        margin-top: 0.3rem;
        min-height: 44px;
      }

      .login-error {
        padding: 0.6em 0.75em;
        font-size: 0.75rem;
        border-radius: 8px;
      }

      .login-footer {
        margin-top: 0.9rem;
      }

      .login-footer__link {
        font-size: 0.72rem;
      }

      .toast {
        left: 0.5rem;
        right: 0.5rem;
        bottom: 0.75rem;
        font-size: 0.78rem;
        padding: 0.7em 1em;
        border-radius: 10px;
      }
    }

    /* ---- Reduced motion ---- */
    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }

      /* Restore visible cursor for users who need it */
      body {
        cursor: auto;
      }
    }

    /* ---- High Contrast / Windows High Contrast Mode ---- */
    @media (forced-colors: active) {
      .login-card {
        border: 2px solid ButtonText;
      }

      .login-form__input {
        border: 1px solid ButtonText;
      }

      .login-form__input:focus-visible {
        outline: 3px solid Highlight;
      }

      .login-btn:focus-visible {
        outline: 3px solid Highlight;
      }

      .login-form__toggle-pw:focus-visible {
        outline: 2px solid Highlight;
      }

      .login-footer__link:focus-visible {
        outline: 2px solid Highlight;
      }
    }
  </style>
</head>
<body>

  <!-- ============================================================
       SKIP TO CONTENT (WCAG 2.2 — 2.4.1 Bypass Blocks)
  ============================================================ -->
  <a href="#login-form" class="skip-to-content">
    <i class="fa-solid fa-arrow-down" aria-hidden="true"></i> Sari la formularul de autentificare
  </a>

  <!-- ============================================================
       BACKGROUND
  ============================================================ -->
  <div class="login-bg" aria-hidden="true">
    <img src="/images/login-bg.jpg" alt="" loading="eager">
  </div>
  <div class="login-bg__overlay" aria-hidden="true"></div>

  <!-- ============================================================
       PARTICLES CANVAS
  ============================================================ -->
  <canvas id="particles-canvas" aria-hidden="true"></canvas>

  <!-- ============================================================
       LOGIN CONTAINER
  ============================================================ -->
  <main class="login-container" aria-labelledby="login-heading">

    <div class="login-card">

      <!-- Brand -->
      <div class="login-brand">
        <div class="login-brand__badge">
          <img src="/images/badge.png" alt="Boxing Champions Badge" width="80" height="80">
        </div>
        <h1 class="login-brand__title" id="login-heading">
          BOXING <span>CHAMPIONS</span>
        </h1>
        <p class="login-brand__subtitle">Panou de Administrare</p>
      </div>

      <!-- Error (WCAG 2.2 — 4.1.3 Status Messages via role="alert" + aria-live="assertive") -->
      <div
        class="login-error"
        id="login-error"
        role="alert"
        aria-live="assertive"
        aria-atomic="true"
      >
        <i class="fa-solid fa-triangle-exclamation" aria-hidden="true"></i>
        <span id="login-error-msg"></span>
      </div>

      <!-- Form -->
      <form
        class="login-form"
        id="login-form"
        novalidate
        autocomplete="on"
        aria-label="Formular de autentificare"
      >
        <!-- Email -->
        <div class="login-form__group">
          <label class="login-form__label" for="login-email">
            <i class="fa-solid fa-envelope" aria-hidden="true"></i> Email
          </label>
          <div class="login-form__input-wrap">
            <input
              class="login-form__input"
              type="email"
              id="login-email"
              name="email"
              placeholder="admin@boxingchampions.ro"
              required
              autocomplete="email"
              inputmode="email"
              aria-required="true"
              aria-describedby="login-error-msg"
            >
            <i class="fa-solid fa-envelope login-form__icon" aria-hidden="true"></i>
          </div>
        </div>

        <!-- Password -->
        <div class="login-form__group">
          <label class="login-form__label" for="login-password">
            <i class="fa-solid fa-lock" aria-hidden="true"></i> Parolă
          </label>
          <div class="login-form__input-wrap">
            <input
              class="login-form__input"
              type="password"
              id="login-password"
              name="password"
              placeholder="••••••••••"
              required
              autocomplete="current-password"
              aria-required="true"
              aria-describedby="login-error-msg"
              minlength="6"
            >
            <i class="fa-solid fa-lock login-form__icon" aria-hidden="true"></i>
            <button
              type="button"
              class="login-form__toggle-pw"
              id="toggle-password"
              aria-label="Arată parola"
              title="Arată / Ascunde parola"
            >
              <i class="fa-solid fa-eye" id="toggle-pw-icon" aria-hidden="true"></i>
            </button>
          </div>
        </div>

        <!-- Submit -->
        <button type="submit" class="login-btn" id="login-submit">
          <span class="login-btn__text">
            <i class="fa-solid fa-right-to-bracket" aria-hidden="true"></i> Autentificare
          </span>
          <span class="login-btn__spinner" role="status" aria-label="Se procesează autentificarea"></span>
        </button>
      </form>

      <!-- Footer -->
      <div class="login-footer">
        <a href="/" class="login-footer__link">
          <i class="fa-solid fa-arrow-left" aria-hidden="true"></i> Înapoi la site
        </a>
      </div>

    </div>
  </main>

  <!-- ============================================================
       SCRIPTS
  ============================================================ -->
  <!-- Global shared.js (particles, cursor, toast) -->
  <script src="/js/shared.js"></script>

  <script>
  (function () {
    'use strict';

    /* ==================================================================
       DOM References
       ================================================================== */
    var form          = document.getElementById('login-form');
    var emailInput    = document.getElementById('login-email');
    var passwordInput = document.getElementById('login-password');
    var submitBtn     = document.getElementById('login-submit');
    var errorBox      = document.getElementById('login-error');
    var errorMsg      = document.getElementById('login-error-msg');
    var togglePwBtn   = document.getElementById('toggle-password');
    var togglePwIcon  = document.getElementById('toggle-pw-icon');

    /* ==================================================================
       Helpers
       ================================================================== */
    var BC = window.BoxingChampions || {};
    var showToast = BC.showToast || function (msg, type, dur) {
      type = type || 'info';
      dur = dur || 4000;

      var existing = document.querySelector('.toast');
      if (existing) existing.remove();

      var icons = { success: 'fa-circle-check', error: 'fa-circle-xmark', info: 'fa-circle-info' };
      var toast = document.createElement('div');
      toast.className = 'toast toast--' + type;
      toast.setAttribute('role', 'status');
      toast.setAttribute('aria-live', 'polite');
      toast.innerHTML = '<i class="fa-solid ' + (icons[type] || icons.info) + '" aria-hidden="true"></i> ' + escapeHTML(msg);
      document.body.appendChild(toast);

      setTimeout(function () {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(30px)';
        toast.style.transition = 'opacity 0.3s, transform 0.3s';
        toast.addEventListener('transitionend', function () {
          if (toast.parentNode) toast.parentNode.removeChild(toast);
        });
        setTimeout(function () {
          if (toast.parentNode) toast.parentNode.removeChild(toast);
        }, 350);
      }, dur);
    };

    function escapeHTML(str) {
      if (!str) return '';
      var div = document.createElement('div');
      div.appendChild(document.createTextNode(str));
      return div.innerHTML;
    }

    /**
     * Show error with WCAG 2.2 support:
     * - Sets the error message text
     * - Toggles aria-invalid on relevant inputs
     * - Shows the error container (role="alert")
     */
    function showError(message) {
      errorMsg.textContent = message;
      errorBox.classList.add('login-error--visible');
    }

    function hideError() {
      errorBox.classList.remove('login-error--visible');
      errorMsg.textContent = '';

      // Clear aria-invalid on all inputs
      setFieldInvalid(emailInput, false);
      setFieldInvalid(passwordInput, false);
    }

    /**
     * Set aria-invalid and visually mark a field as errored (WCAG 2.2 — 3.3.1 Error Identification).
     * @param {HTMLInputElement} input
     * @param {boolean} invalid
     */
    function setFieldInvalid(input, invalid) {
      if (invalid) {
        input.setAttribute('aria-invalid', 'true');
        input.classList.add('login-form__input--error');
      } else {
        input.removeAttribute('aria-invalid');
        input.classList.remove('login-form__input--error');
      }
    }

    function markFieldError(input) {
      setFieldInvalid(input, true);
      // Automatically clear error state on first input change (WCAG 2.2 — 3.3.4 Error Prevention)
      input.addEventListener('input', function clearError() {
        setFieldInvalid(input, false);
        // If no other field has errors, hide the global error box
        if (!emailInput.classList.contains('login-form__input--error') &&
            !passwordInput.classList.contains('login-form__input--error')) {
          hideError();
        }
        input.removeEventListener('input', clearError);
      }, { once: true });
    }

    function setLoading(isLoading) {
      if (isLoading) {
        submitBtn.classList.add('login-btn--loading');
        submitBtn.disabled = true;
        submitBtn.setAttribute('aria-busy', 'true');
      } else {
        submitBtn.classList.remove('login-btn--loading');
        submitBtn.disabled = false;
        submitBtn.removeAttribute('aria-busy');
      }
    }

    /* ==================================================================
       Password Toggle (WCAG 2.2 — 4.1.2 Name, Role, Value)
       ================================================================== */
    if (togglePwBtn && togglePwIcon) {
      togglePwBtn.addEventListener('click', function () {
        var isPassword = passwordInput.type === 'password';
        passwordInput.type = isPassword ? 'text' : 'password';
        togglePwIcon.className = isPassword ? 'fa-solid fa-eye-slash' : 'fa-solid fa-eye';
        togglePwBtn.setAttribute('aria-label', isPassword ? 'Ascunde parola' : 'Arată parola');
      });
    }

    /* ==================================================================
       Form Submit
       ================================================================== */
    form.addEventListener('submit', async function (e) {
      e.preventDefault();
      hideError();

      // --- Client-side validation (WCAG 2.2 — 3.3.1 Error Identification) ---
      var email = emailInput.value.trim();
      var password = passwordInput.value;

      var hasError = false;

      if (!email) {
        markFieldError(emailInput);
        showError('Te rugăm să introduci adresa de email.');
        hasError = true;
      } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        markFieldError(emailInput);
        showError('Adresa de email nu este validă.');
        hasError = true;
      } else {
        setFieldInvalid(emailInput, false);
      }

      if (!password) {
        markFieldError(passwordInput);
        if (!hasError) showError('Te rugăm să introduci parola.');
        hasError = true;
      } else if (password.length < 6) {
        markFieldError(passwordInput);
        if (!hasError) showError('Parola trebuie să aibă cel puțin 6 caractere.');
        hasError = true;
      } else {
        setFieldInvalid(passwordInput, false);
      }

      if (hasError) {
        // Move focus to the first invalid field (WCAG 2.2 — 3.3.1)
        var firstInvalid = document.querySelector('.login-form__input--error');
        if (firstInvalid) {
          firstInvalid.focus();
        }
        return;
      }

      // --- API Call ---
      setLoading(true);

      try {
        var response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Accept': 'application/json',
            'X-Requested-With': 'XMLHttpRequest',
          },
          body: JSON.stringify({ email: email, password: password }),
          credentials: 'same-origin',
        });

        var data;
        var contentType = response.headers.get('content-type') || '';
        if (contentType.includes('application/json')) {
          data = await response.json();
        } else {
          var text = await response.text();
          try { data = JSON.parse(text); } catch (_) { data = { _raw: text }; }
        }

        if (!response.ok) {
          throw new Error(
            data?.error || 'Email sau parolă incorecte. Încearcă din nou.'
          );
        }

        // Success
        showToast(
          data?.message || 'Autentificare reușită! Redirecționare...',
          'success',
          2000
        );

        // Redirect to dashboard after a short delay
        setTimeout(function () {
          window.location.href = '/admin/views/dashboard.html';
        }, 800);

      } catch (err) {
        console.error('[login] Error:', err.message);

        var errMsg = err.message || 'A apărut o eroare. Încearcă din nou.';

        // Generic error for non-network issues
        if (err.name === 'TypeError' && err.message === 'Failed to fetch') {
          errMsg = 'Nu s-a putut conecta la server. Verifică conexiunea la internet.';
        }

        showError(errMsg);
        showToast(errMsg, 'error', 4000);

        // Shake the card on error (only if no reduced-motion preference)
        if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
          var card = document.querySelector('.login-card');
          if (card) {
            card.style.animation = 'none';
            card.offsetHeight; // Trigger reflow
            card.style.animation = 'shakeError 0.5s ease';
          }
        }

      } finally {
        setLoading(false);
      }
    });

    /* ==================================================================
       Particles Canvas (inline fallback if shared.js not loaded)
       ================================================================== */
    function initParticlesFallback() {
      var canvas = document.getElementById('particles-canvas');
      if (!canvas) return;

      // If BoxingChampions.Particles already initialized, skip
      if (BC.Particles && BC.Particles.canvas) return;

      var ctx = canvas.getContext('2d');
      var width, height;
      var particles = [];
      var mouse = { x: -1000, y: -1000 };
      var animFrame;

      function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
      }

      function createParticles() {
        particles = [];
        var count = Math.floor(40 * (width * height) / (1920 * 1080));
        for (var i = 0; i < count; i++) {
          particles.push({
            x: Math.random() * width,
            y: Math.random() * height,
            vx: (Math.random() - 0.5) * 0.35,
            vy: (Math.random() - 0.5) * 0.35,
            radius: Math.random() * 2 + 0.3,
            originalRadius: Math.random() * 2 + 0.3,
          });
        }
      }

      function animate() {
        ctx.clearRect(0, 0, width, height);
        for (var i = 0; i < particles.length; i++) {
          var p = particles[i];
          p.x += p.vx;
          p.y += p.vy;

          if (p.x < -20) p.x = width + 20;
          if (p.x > width + 20) p.x = -20;
          if (p.y < -20) p.y = height + 20;
          if (p.y > height + 20) p.y = -20;

          var dxM = p.x - mouse.x;
          var dyM = p.y - mouse.y;
          var distM = Math.sqrt(dxM * dxM + dyM * dyM);
          if (distM < 120) {
            p.radius = p.originalRadius + (1 - distM / 120) * 1.5;
          } else {
            p.radius += (p.originalRadius - p.radius) * 0.08;
          }

          ctx.beginPath();
          ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(212, 168, 67, 0.28)';
          ctx.fill();
        }

        animFrame = requestAnimationFrame(animate);
      }

      resize();
      createParticles();

      window.addEventListener('resize', function () {
        resize();
        createParticles();
      });

      document.addEventListener('mousemove', function (e) {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
      });

      document.addEventListener('mouseleave', function () {
        mouse.x = -1000;
        mouse.y = -1000;
      });

      animate();
    }

    /* ==================================================================
       Init
       ================================================================== */
    function init() {
      // Focus first field (with a small delay for animation)
      if (emailInput) {
        setTimeout(function () {
          emailInput.focus();
        }, 600);
      }

      // Start particles (as fallback)
      setTimeout(initParticlesFallback, 300);
    }

    // Run on DOM ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }

  })();
  </script>

</body>
