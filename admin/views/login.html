<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autentificare - Boxing Champions Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --bg-panel: #111111;
            --gold: #d4af37;
            --gold-light: #f0c040;
            --gold-dark: #b8941f;
            --red: #c0392b;
            --red-light: #e74c3c;
            --text: #e0e0e0;
            --text-muted: #999;
            --glass-bg: rgba(17, 17, 17, 0.75);
            --glass-border: rgba(212, 175, 55, 0.18);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.55);
            --transition: 0.28s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            line-height: 1.55;
        }

        /* Background image with overlay */
        .login-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        .login-bg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.25;
            filter: brightness(0.4);
        }

        .login-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at center, rgba(10,10,10,0.5) 0%, rgba(10,10,10,0.9) 70%);
        }

        /* Particles canvas */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* Login card */
        .login-wrapper {
            position: relative;
            z-index: 5;
            width: 100%;
            max-width: 440px;
            padding: 20px;
        }

        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(18px) saturate(120%);
            -webkit-backdrop-filter: blur(18px) saturate(120%);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 40px 36px;
            box-shadow: var(--glass-shadow);
        }

        .login-logo {
            text-align: center;
            margin-bottom: 28px;
        }

        .login-logo i {
            font-size: 3rem;
            color: var(--gold);
            filter: drop-shadow(0 0 14px rgba(212, 175, 55, 0.5));
            margin-bottom: 8px;
            display: block;
        }

        .login-logo h1 {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .login-logo p {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.82rem;
            color: var(--gold-light);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            color: var(--text-muted);
            font-size: 0.95rem;
            pointer-events: none;
            transition: color var(--transition);
        }

        .input-wrapper input {
            width: 100%;
            padding: 12px 14px 12px 42px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.04);
            color: var(--text);
            font-size: 0.95rem;
            font-family: inherit;
            transition: border var(--transition), box-shadow var(--transition);
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
        }

        .input-wrapper input:focus + i,
        .input-wrapper:focus-within i {
            color: var(--gold-light);
        }

        .input-wrapper input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        /* Error message */
        .login-error {
            background: rgba(192, 57, 43, 0.12);
            border: 1px solid rgba(192, 57, 43, 0.35);
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 18px;
            color: var(--red-light);
            font-size: 0.88rem;
            font-weight: 500;
            display: none;
            align-items: center;
            gap: 10px;
        }

        .login-error.visible {
            display: flex;
        }

        .login-error i {
            flex-shrink: 0;
            font-size: 1rem;
        }

        /* Submit button */
        .btn-login {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 13px 20px;
            background: linear-gradient(135deg, var(--gold-dark), var(--gold));
            border: none;
            border-radius: 8px;
            color: #0a0a0a;
            cursor: pointer;
            font-size: 0.97rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            transition: all var(--transition);
            box-shadow: 0 4px 14px rgba(212, 175, 55, 0.3);
        }

        .btn-login:hover {
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.5);
            transform: translateY(-1px);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Spinner */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(10, 10, 10, 0.25);
            border-top-color: #0a0a0a;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Back link */
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: var(--text-muted);
            font-size: 0.85rem;
            text-decoration: none;
            transition: color var(--transition);
        }

        .back-link:hover {
            color: var(--gold-light);
        }

        .back-link i {
            margin-right: 6px;
        }

        /* Focus visible */
        :focus-visible {
            outline: 2px solid var(--gold-light);
            outline-offset: 2px;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-card {
                padding: 28px 20px;
            }

            .login-logo i {
                font-size: 2.4rem;
            }

            .login-logo h1 {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Background -->
    <div class="login-bg" aria-hidden="true">
        <img src="../images/login-bg.jpg" alt="">
    </div>

    <!-- Particles -->
    <canvas id="particle-canvas" aria-hidden="true"></canvas>

    <!-- Login Card -->
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-logo">
                <i class="fa-solid fa-glove"></i>
                <h1>Boxing Champions</h1>
                <p>Panou de Administrare</p>
            </div>

            <!-- Error message area -->
            <div class="login-error" id="loginError" role="alert" aria-live="assertive">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span id="loginErrorMessage"></span>
            </div>

            <form id="loginForm" novalidate>
                <div class="form-group">
                    <label for="email">Email</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" id="email" name="email" placeholder="admin@boxing-champions.ro" required autocomplete="email" autofocus>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Parolă</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
                    </div>
                </div>

                <button type="submit" class="btn-login" id="btnLogin">
                    <i class="fa-solid fa-right-to-bracket"></i> Autentificare
                </button>
            </form>
        </div>

        <a href="/" class="back-link"><i class="fa-solid fa-arrow-left"></i> Înapoi la site</a>
    </div>

    <script>
        (function () {
            'use strict';

            // DOM elements
            var loginForm = document.getElementById('loginForm');
            var loginError = document.getElementById('loginError');
            var loginErrorMessage = document.getElementById('loginErrorMessage');
            var btnLogin = document.getElementById('btnLogin');
            var emailInput = document.getElementById('email');
            var passwordInput = document.getElementById('password');
            var particleCanvas = document.getElementById('particle-canvas');

            // -------------------------------------------------------------------
            // Particles background
            // -------------------------------------------------------------------
            function initParticles() {
                var ctx = particleCanvas.getContext('2d');
                var particles = [];
                var COUNT = 50;
                var PALETTE = [
                    'rgba(212,175,55,0.22)',
                    'rgba(240,192,64,0.18)',
                    'rgba(184,148,31,0.24)',
                    'rgba(230,180,50,0.16)',
                    'rgba(200,160,40,0.20)'
                ];

                function resize() {
                    particleCanvas.width = window.innerWidth;
                    particleCanvas.height = window.innerHeight;
                }
                window.addEventListener('resize', resize);
                resize();

                function mk() {
                    return {
                        x: Math.random() * particleCanvas.width,
                        y: Math.random() * particleCanvas.height,
                        radius: Math.random() * 2.8 + 0.8,
                        speedX: (Math.random() - 0.5) * 0.35,
                        speedY: (Math.random() - 0.5) * 0.35,
                        color: PALETTE[Math.floor(Math.random() * PALETTE.length)],
                        opacity: Math.random() * 0.6 + 0.2,
                        pulse: Math.random() * Math.PI * 2,
                        pulseSpeed: Math.random() * 0.015 + 0.005
                    };
                }

                for (var i = 0; i < COUNT; i++) {
                    particles.push(mk());
                }

                function animate() {
                    ctx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);

                    for (var i = 0; i < particles.length; i++) {
                        var p = particles[i];
                        p.x += p.speedX;
                        p.y += p.speedY;
                        p.pulse += p.pulseSpeed;
                        var o = p.opacity + Math.sin(p.pulse) * 0.12;

                        if (p.x < -10) p.x = particleCanvas.width + 10;
                        if (p.x > particleCanvas.width + 10) p.x = -10;
                        if (p.y < -10) p.y = particleCanvas.height + 10;
                        if (p.y > particleCanvas.height + 10) p.y = -10;

                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                        ctx.fillStyle = p.color.replace(/[\d.]+\)$/, Math.max(0.04, Math.min(0.5, o)) + ')');
                        ctx.fill();
                    }

                    for (var i2 = 0; i2 < particles.length; i2++) {
                        for (var j = i2 + 1; j < particles.length; j++) {
                            var dx = particles[i2].x - particles[j].x;
                            var dy = particles[i2].y - particles[j].y;
                            var dist = Math.sqrt(dx * dx + dy * dy);
                            if (dist < 100) {
                                ctx.beginPath();
                                ctx.moveTo(particles[i2].x, particles[i2].y);
                                ctx.lineTo(particles[j].x, particles[j].y);
                                ctx.strokeStyle = 'rgba(212,175,55,' + (0.06 * (1 - dist / 100)) + ')';
                                ctx.lineWidth = 0.5;
                                ctx.stroke();
                            }
                        }
                    }

                    requestAnimationFrame(animate);
                }

                animate();
            }

            // -------------------------------------------------------------------
            // Error display
            // -------------------------------------------------------------------
            function showError(message) {
                loginErrorMessage.textContent = message;
                loginError.classList.add('visible');
            }

            function hideError() {
                loginError.classList.remove('visible');
                loginErrorMessage.textContent = '';
            }

            // -------------------------------------------------------------------
            // Loading state
            // -------------------------------------------------------------------
            function setLoading(isLoading) {
                if (isLoading) {
                    btnLogin.disabled = true;
                    btnLogin.innerHTML = '<span class="spinner"></span> Se autentifică...';
                } else {
                    btnLogin.disabled = false;
                    btnLogin.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Autentificare';
                }
            }

            // -------------------------------------------------------------------
            // Form submit handler
            // -------------------------------------------------------------------
            loginForm.addEventListener('submit', function (e) {
                e.preventDefault();
                hideError();

                var email = emailInput.value.trim();
                var password = passwordInput.value;

                // Basic client-side validation
                if (!email || !password) {
                    showError('Completează email-ul și parola.');
                    return;
                }

                if (!/^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/i.test(email)) {
                    showError('Adresa de email nu este validă.');
                    return;
                }

                setLoading(true);

                fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    credentials: 'same-origin',
                    body: JSON.stringify({ email: email, password: password })
                })
                .then(function (response) {
                    return response.json().then(function (data) {
                        return { status: response.status, data: data };
                    });
                })
                .then(function (result) {
                    if (result.data && result.data.success) {
                        // Autentificare reușită
                        window.location.href = result.data.redirect || '/admin/dashboard';
                        return;
                    }

                    // Autentificare eșuată — citește atât `message` cât și `error`
                    var msg = (result.data && (result.data.message || result.data.error))
                        ? (result.data.message || result.data.error)
                        : 'Email sau parolă incorecte.';

                    showError(msg);
                    setLoading(false);
                })
                .catch(function (err) {
                    // Eroare de rețea sau JSON invalid
                    showError('Eroare de conexiune. Verifică internetul și reîncearcă.');
                    setLoading(false);
                });
            });

            // -------------------------------------------------------------------
            // Hide error on input
            // -------------------------------------------------------------------
            emailInput.addEventListener('input', hideError);
            passwordInput.addEventListener('input', hideError);

            // -------------------------------------------------------------------
            // Init
            // -------------------------------------------------------------------
            initParticles();
        })();
    </script>
</body>
</html>
